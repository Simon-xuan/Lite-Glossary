name: Build and Release

# 触发方式：
#   1) 推送以 v 开头的标签（如 v1.0.1）会自动用该标签号发布
#   2) 也可在 Actions 页面手动触发（默认按下方 DEFAULT_TAG 发布）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_TAG: v1.1.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${DEFAULT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        run: |
          # 打包成带顶层目录 wordnest/ 的标准 WordPress 安装包，
          # 排除开发/文档/版本控制文件（尤其是体积较大的 docs/ 截图）。
          mkdir -p build/wordnest
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='docs' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='*.md' \
            ./ build/wordnest/
          (cd build && zip -rq ../Wordnest.zip wordnest)
          echo "打包内容："
          unzip -l Wordnest.zip

      # 更新日志单一来源：按 tag 号从 README 抽取对应版本的小节，
      # 避免在 workflow 里硬编码某一版的内容（否则后续 tag 会贴出过时日志）。
      - name: Generate release notes
        run: |
          VERSION="${{ steps.meta.outputs.tag }}"
          VERSION="${VERSION#v}"
          HEADER="### v${VERSION}"
          extract() {
            awk -v hdr="$HEADER" '$0==hdr{f=1;next} f&&/^### v/{exit} f{print}' "$1"
          }
          EN="$(extract README.en.md)"
          ZH="$(extract README.md)"
          {
            if [ -n "${EN}${ZH}" ]; then
              printf '## English\n\n'
              printf '%s\n' "${EN:-_See readme.txt for the full changelog._}"
              printf '\n## Chinese\n\n'
              printf '%s\n' "${ZH:-_完整更新日志见 readme.txt。_}"
            else
              printf 'Wordnest %s — see readme.txt for the changelog.\n' "$VERSION"
            fi
          } > RELEASE_NOTES.md
          echo "----- generated RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Wordnest ${{ steps.meta.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: Wordnest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
