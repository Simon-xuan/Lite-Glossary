name: Build and Release

# 触发方式：
#   1) 推送以 v 开头的标签（如 v1.0.1）会自动用该标签号发布
#   2) 也可在 Actions 页面手动触发（默认按下方 DEFAULT_TAG 发布）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_TAG: v1.0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${DEFAULT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        run: |
          # 打包成带顶层目录 lite-glossary/ 的标准 WordPress 安装包，
          # 排除开发/文档/版本控制文件（尤其是体积较大的 docs/ 截图）。
          mkdir -p build/lite-glossary
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='docs' \
            --exclude='build' \
            --exclude='*.zip' \
            ./ build/lite-glossary/
          (cd build && zip -rq ../LiteGlossary.zip lite-glossary)
          echo "打包内容："
          unzip -l LiteGlossary.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lite Glossary ${{ steps.meta.outputs.tag }}
          body: |
            ## Lite Glossary ${{ steps.meta.outputs.tag }}

            ### 🔒 Security hardening
            - All user input is now unslashed (`wp_unslash`) and sanitized (`sanitize_text_field` / `sanitize_textarea_field`) before use
            - Nonces are sanitized before verification, with proper `isset` guards
            - Added an explicit capability check (`current_user_can('delete_posts')`) to single-term deletion
            - CSV import sanitizes each field, stripping any HTML/script on the way in

            ### 🐛 Bug fixes
            - The "Only highlight the first occurrence" setting was never saved — it now persists correctly

            ### 📦 Packaging
            - The release zip now ships a proper top-level `lite-glossary/` folder and excludes development assets (screenshots, etc.)

            ### 🚀 Installation
            1. Download `LiteGlossary.zip` from the Assets below.
            2. In your WordPress dashboard go to **Plugins → Add New Plugin → Upload Plugin**, choose the zip, and install.
            3. Click **Activate**.
          files: LiteGlossary.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
