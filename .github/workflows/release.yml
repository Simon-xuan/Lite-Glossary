name: Build and Release

# 触发方式：
#   1) 推送以 v 开头的标签（如 v1.0.1）会自动用该标签号发布
#   2) 也可在 Actions 页面手动触发（默认按下方 DEFAULT_TAG 发布）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEFAULT_TAG: v1.0.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${DEFAULT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        run: |
          # 打包成带顶层目录 lite-glossary/ 的标准 WordPress 安装包，
          # 排除开发/文档/版本控制文件（尤其是体积较大的 docs/ 截图）。
          mkdir -p build/lite-glossary
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='docs' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='*.md' \
            ./ build/lite-glossary/
          (cd build && zip -rq ../LiteGlossary.zip lite-glossary)
          echo "打包内容："
          unzip -l LiteGlossary.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lite Glossary ${{ steps.meta.outputs.tag }}
          body: |
            **🔒 Security hardening**

            * Tooltips are now rendered with DOM text nodes instead of `innerHTML` — removes the DOM XSS sink flagged by code scanning (`js/xss-through-dom`)
            * All user input is now unslashed (`wp_unslash`) and sanitized (`sanitize_text_field` / `sanitize_textarea_field`) before use
            * Nonces are sanitized before verification, with proper `isset` guards
            * Added an explicit capability check (`current_user_can('delete_posts')`) to single-term deletion
            * CSV import sanitizes each field, stripping any HTML/script on the way in

            **🐛 Bug fixes**

            * The "Only highlight the first occurrence" setting was never saved — it now persists correctly

            **⚡ Performance**

            * Removed leftover migration code that cleared the term cache on every request — Transient caching now actually takes effect

            **🏷️ Naming**

            * The name shown in the Plugins list is now "Lite Glossary"

            **✅ Compliance**

            * Added a `sanitize_callback` to `register_setting`, and the production zip excludes extra Markdown files — passes the WordPress.org Plugin Check

            **📦 Packaging**

            * The release zip now ships a proper top-level `lite-glossary/` folder and excludes development assets (screenshots, Markdown, etc.)

            **🚀 Installation**

            1. Download `LiteGlossary.zip` from the Assets section below
            2. Go to **Plugins → Add New Plugin → Upload Plugin**, select the zip, and install
            3. Click **Activate Plugin**

            ### 🔒 安全加固
            - 所有用户输入统一 `wp_unslash` + `sanitize_text_field` / `sanitize_textarea_field` 后再使用
            - nonce 校验前先净化，并补 `isset` 判断
            - 单条删除新增权限检查 `current_user_can('delete_posts')`
            - CSV 导入逐字段净化，恶意 HTML/脚本入库即被剥离

            ### 🐛 问题修复
            - 「仅高亮内容中首次出现的术语」设置此前从不保存，现已正确持久化

            ### ⚡ 性能
            - 移除每次请求都清空术语缓存的遗留迁移代码，Transient 缓存现已真正生效

            ### 🏷️ 命名
            - 插件列表显示名改为英文「Lite Glossary」

            ### ✅ 合规
            - `register_setting` 增加 `sanitize_callback`，生产包排除多余 Markdown 文件 —— 通过 WordPress.org 插件检查

            ### 📦 打包改进
            - 发布 zip 现采用标准顶层目录 `lite-glossary/`，并排除文档/截图/Markdown 等开发资源

            ### 🚀 安装使用
            1. 在下方 Assets 栏目下载 `LiteGlossary.zip`
            2. 进入 **插件 → 添加新插件 → 上传插件**，选择 zip 并安装
            3. 点击 **激活插件**
          files: LiteGlossary.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
